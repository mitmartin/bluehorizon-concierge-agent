<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Horizon Helper — Blue Horizon Cruise Line</title>
  <style>
    :root { --bh:#006a8e; --bh2:#00435a; --bg:#eef7fb; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:#123; }
    header { background:linear-gradient(135deg,var(--bh),var(--bh2)); color:#fff; padding:18px 22px; }
    header h1 { margin:0; font-size:1.15rem; }
    header p { margin:4px 0 0; opacity:.85; font-size:.85rem; }
    main { max-width:760px; margin:0 auto; padding:16px; height:calc(100vh - 76px); display:flex; flex-direction:column; }
    #log { flex:1; overflow-y:auto; padding:8px; }
    .msg { margin:10px 0; display:flex; }
    .msg .bubble { padding:11px 15px; border-radius:16px; max-width:80%; white-space:pre-wrap; line-height:1.4; box-shadow:0 2px 8px rgba(0,50,90,.08); }
    .user { justify-content:flex-end; }
    .user .bubble { background:var(--bh); color:#fff; border-bottom-right-radius:4px; }
    .bot .bubble { background:#fff; border-bottom-left-radius:4px; }
    .hint { color:#5a7180; font-size:.8rem; text-align:center; margin:6px 0 0; }
    form { display:flex; gap:8px; padding:10px 4px; }
    input { flex:1; padding:13px 15px; border:1px solid #b8d3df; border-radius:12px; font-size:1rem; }
    button { padding:0 20px; border:0; border-radius:12px; background:var(--bh); color:#fff; font-size:1rem; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <header>
    <h1>⚓ Horizon Helper</h1>
    <p>Your Blue Horizon shore-excursion concierge</p>
  </header>
  <main>
    <div id="log">
      <div class="msg bot"><div class="bubble">Ahoy! Tell me your port, what you're into, and your budget — I'll suggest some shore excursions. 🌊</div></div>
    </div>
    <p class="hint" id="hint"></p>
    <form id="f">
      <input id="m" autocomplete="off" placeholder="e.g. Cozumel, snorkeling, 2 kids, ~$150pp" />
      <button id="send" type="submit">Send</button>
    </form>
  </main>
  <script src="/app.js"></script>
</body>
</html>
